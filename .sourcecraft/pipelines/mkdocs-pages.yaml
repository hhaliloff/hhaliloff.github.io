stages:
  - build
  - deploy

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

default:
  image: python:3.12

build_mkdocs:
  stage: build
  script:
    - python -m pip install --upgrade pip
    - pip install mkdocs mkdocs-simple-blog
    - cd source
    - mkdocs build --clean --strict
  artifacts:
    paths:
      - source/site
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request"
    - if: $CI_COMMIT_BRANCH

pages:
  stage: deploy
  needs:
    - job: build_mkdocs
      artifacts: true
  script:
    - mkdir -p public
    - cp -r source/site/. public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
